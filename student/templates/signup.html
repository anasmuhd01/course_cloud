<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body
    class="min-h-screen bg-gradient-to-br from-slate-950 via-indigo-950 to-slate-900 flex items-center justify-center p-6">

    <!-- Background Blur -->
    <div class="absolute inset-0 overflow-hidden">
        <div class="absolute top-20 left-20 h-72 w-72 rounded-full bg-indigo-600/20 blur-3xl"></div>
        <div class="absolute bottom-20 right-20 h-72 w-72 rounded-full bg-purple-600/20 blur-3xl"></div>
    </div>

    <!-- Card -->
    <div class="relative w-full max-w-md rounded-3xl border border-white/10 bg-white/5 backdrop-blur-xl shadow-2xl p-8">

        <!-- Logo/Icon -->
        <div class="flex justify-center mb-6">
            <div
                class="flex h-16 w-16 items-center justify-center rounded-2xl bg-indigo-500 shadow-lg shadow-indigo-500/30">
                <span class="text-3xl text-white">👋</span>
            </div>
        </div>

        <!-- Heading -->
        <div class="text-center">
            <h1 class="text-4xl font-bold text-white">
                Create Account
            </h1>

            <p class="mt-2 text-gray-400">
                Join us and start your journey today.
            </p>
        </div>

        <!-- Form -->
        <form method="POST" class="mt-8 space-y-5">
            {% csrf_token %}

            <!-- Username -->
            <div>
                <input type="text" name="username" placeholder="Username"
                    class="w-full rounded-xl border border-white/10 bg-white/5 px-4 py-3 text-white placeholder-gray-500 outline-none transition focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/30" />

                <p class="mt-1 text-sm text-red-400">
                    {{ form.username.errors }}
                </p>
            </div>

            <!-- Email -->
            <div>
                <input type="email" name="email" placeholder="Email Address" required
                    class="w-full rounded-xl border border-white/10 bg-white/5 px-4 py-3 text-white placeholder-gray-500 outline-none transition focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/30" />
            </div>

            <!-- Password -->
            <div>
                <input type="password" name="password1" placeholder="Password" required
                    class="w-full rounded-xl border border-white/10 bg-white/5 px-4 py-3 text-white placeholder-gray-500 outline-none transition focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/30" />
            </div>

            <!-- Confirm Password -->
            <div>
                <input type="password" name="password2" placeholder="Confirm Password" required
                    class="w-full rounded-xl border border-white/10 bg-white/5 px-4 py-3 text-white placeholder-gray-500 outline-none transition focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/30" />

                <p class="mt-1 text-sm text-red-400">
                    {{ form.password2.errors }}
                </p>
            </div>

            <!-- Submit Button -->
            <button type="submit"
                class="w-full rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 py-3 font-semibold text-white transition duration-300 hover:scale-[1.02] hover:shadow-lg hover:shadow-indigo-500/30">
                Create Account
            </button>

            <!-- Divider -->
            <div class="flex items-center gap-4">
                <div class="h-px flex-1 bg-white/10"></div>
                <span class="text-sm text-gray-500">OR</span>
                <div class="h-px flex-1 bg-white/10"></div>
            </div>

            <!-- Login Link -->
            <p class="text-center text-gray-400">
                Already have an account?
                <a href="{% url 'signin' %}" class="font-semibold text-indigo-400 hover:text-indigo-300">
                    Sign In
                </a>
            </p>

        </form>
    </div>

</body>

</html>
