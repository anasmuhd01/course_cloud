<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="bg-gray-900">
    <!--
  This example requires updating your template:

  ```
  <html class="h-full bg-gray-900">
  <body class="h-full">
  ```
-->
    <div class="container flex min-h-full flex-col items-center justify-center px-6 py-12 lg:px-8  ">

        <h2 class="text-5xl font-semibold tracking-tight text-white sm:text-7xl">Sign Up</h2>

        <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">
            <form action="#" method="POST" class="space-y-6">
                {% csrf_token %}


                <div class="mt-2">
                    <input id="text" type="text" name="username" placeholder="Username"
                        class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-white outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6" />
                    <span class=" font text-amber-500">{{form.username.errors}}</span>
                </div>

                <div class="mt-2">
                    <input id="email" type="email" name="email" required autocomplete="email" placeholder="Enter Email"
                        class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-white outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6" />
                </div>


                <div class="mt-2">
                    <input id="password" type="password" name="password1" required autocomplete="current-password"
                        placeholder="Enter Password"
                        class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-white outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6" />
                </div>



                <div class="mt-2">
                    <input id="password" type="password" name="password2" required autocomplete="current-password"
                        placeholder="Confirm Password"
                        class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-white outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6" />
                    <span class="text-amber-500">{{form.password2.errors}}</span>
                </div>


                <div class="flex justify-between">
                    <button type="submit"
                        class="flex  justify-center rounded-md bg-indigo-500 px-3 py-1.5 text-sm/6 font-semibold text-white hover:bg-indigo-400 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500">Sign
                        up</button>
                    <a href="{% url 'signin' %}" class="underline text-white">Already registerd ?</a>
                </div>

            </form>


        </div>
    </div>

</body>

</html>
