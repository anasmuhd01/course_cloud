{% extends 'base.html' %}
{% block base %}
<h1 class="text-3xl text-center text-blue-600">{{course.title}}</h1>
<div class="w-full grid grid-cols-1 md:grid-cols-3">

    <div class="p-2 border-e border-e-gray-500 col-span-2">

        {{lesson}}

        <iframe class="w-full rounded" height="500" src="{{lesson.video}}" title="YouTube video player" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </div>
    <div class="max-w-screen-md mx-auto p-10 ">
        <div id="accordion-flush" data-accordion="collapse"
            data-active-classes="bg-white dark:bg-gray-900 text-gray-900 dark:text-white"
            data-inactive-classes="text-gray-500 dark:text-gray-400">
            {% for module in course.modules.all %}
            <h3 id="accordion-flush-heading-1">
                <button type="button"
                    class="flex items-center justify-between w-full py-5 px-4 font-medium text-left border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 text-gray-900 dark:text-white"
                    data-accordion-target="#accordion-flush-body-{{module.id}}" aria-expanded="true"
                    aria-controls="accordion-flush-body-1">
                    <span>{{module}}</span>
                    <svg data-accordion-icon="" class="w-6 h-6 shrink-0 rotate-180" fill="currentColor"
                        viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                        <path fill-rule="evenodd"
                            d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
                            clip-rule="evenodd"></path>
                    </svg>
                </button>
            </h3>
            {% for lesson in module.lessons.all %}
            <div id="accordion-flush-body-{{module.id}}" class="" aria-labelledby="accordion-flush-heading-1">
                <div class="py-5 border-b border-gray-200 dark:border-gray-700">
                    <a href="{% url 'viewlesson' course.id %}?lesson={{lesson.id}}"
                        class="mb-2 text-gray-500 dark:text-gray-400">
                        {{lesson}}
                    </a>

                </div>
            </div>
            {% endfor %}
            {% endfor %}


        </div>
    </div>

    <script src="https://unpkg.com/flowbite@1.4.1/dist/flowbite.js"></script>

</div>
{% endblock base %}
