{% extends 'base.html' %}
{% block base %}

<div class="grid  md:grid-cols-2 ">
    <div class="p-3">
        <iframe width="100%" height="315" src="{{course.thumbnail}}" title="YouTube video player" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    </div>

    <div class="p-3 flex flex-col justify-around gap-2">
        <h2 class="  text-4xl text-shadow">{{course.title}}</h2>
        <h2 class=" text-lg text-right">
            <i class="fa-solid fa-chalkboard-user" style="color: rgb(177, 151, 252);"></i>
            {{course.instructor}}

        </h2>
        <div>
            {% for i in course.category.all %}
            <span>{{i.name}}</span> <b>|</b>
            {% endfor %}
        </div>


        <h3 class="text-lg">RS: {{course.price}}</h3>

        <p class="">{{course.description}}</p>
        <h4 class="text-lg"><b>Created At:</b>{{course.created_at}}</h4>
        <h4 class="text-lg"><b>Updated At:</b>{{course.updated_at}}</h4>
    </div>

</div>

{% endblock base %}
