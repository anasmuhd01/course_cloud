<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body
    class="min-h-screen bg-gradient-to-br from-slate-950 via-indigo-950 to-slate-900 flex items-center justify-center p-6">

    <!-- Background Glow -->
    <div class="absolute inset-0 overflow-hidden">
        <div class="absolute top-20 left-20 h-72 w-72 rounded-full bg-indigo-600/20 blur-3xl"></div>
        <div class="absolute bottom-20 right-20 h-72 w-72 rounded-full bg-purple-600/20 blur-3xl"></div>
    </div>

    <!-- Login Card -->
    <div class="relative w-full max-w-md rounded-3xl border border-white/10 bg-white/5 backdrop-blur-xl shadow-2xl p-8">

        <!-- Logo -->
        <div class="flex justify-center mb-6">
            <div
                class="h-16 w-16 rounded-2xl bg-indigo-500 flex items-center justify-center shadow-lg shadow-indigo-500/30">
                <span class="text-3xl text-white">🔐</span>
            </div>
        </div>

        <!-- Heading -->
        <div class="text-center">
            <h1 class="text-4xl font-bold text-white">
                Welcome Back
            </h1>
            <p class="mt-2 text-gray-400">
                Sign in to continue
            </p>
        </div>

        <!-- Messages -->
        {% if messages %}
        {% for msg in messages %}
        <div class="mt-6 rounded-xl border border-red-500/20 bg-red-500/10 px-4 py-3 text-sm text-red-300">
            {{ msg }}
        </div>
        {% endfor %}
        {% endif %}

        <!-- Form -->
        <form method="POST" class="mt-8 space-y-5">
            {% csrf_token %}

            <!-- Username -->
            <div>
                <input type="text" name="username" placeholder="Username" required autocomplete="off"
                    class="w-full rounded-xl border border-white/10 bg-white/5 px-4 py-3 text-white placeholder-gray-500 outline-none transition focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/30">
            </div>

            <!-- Password -->
            <div>
                <input type="password" name="password" placeholder="Password" required autocomplete="current-password"
                    class="w-full rounded-xl border border-white/10 bg-white/5 px-4 py-3 text-white placeholder-gray-500 outline-none transition focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/30">
            </div>

            <!-- Remember + Forgot -->
            <!-- <div class="flex items-center justify-between text-sm">
                <label class="flex items-center gap-2 text-gray-400">
                    

                <a href="#" class="text-indigo-400 hover:text-indigo-300">
                    Forgot password?
                </a>
            </div> -->

            <!-- Submit -->
            <button type="submit"
                class="w-full rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 py-3 font-semibold text-white transition duration-300 hover:scale-[1.02] hover:shadow-lg hover:shadow-indigo-500/30">
                Sign In
            </button>

            <!-- Divider -->
            <div class="flex items-center gap-4">
                <div class="h-px flex-1 bg-white/10"></div>
                <span class="text-sm text-gray-500">OR</span>
                <div class="h-px flex-1 bg-white/10"></div>
            </div>

            <!-- Signup -->
            <p class="text-center text-gray-400">
                Don't have an account?
                <a href="{% url 'signup' %}" class="font-semibold text-indigo-400 hover:text-indigo-300">
                    Create Account
                </a>
            </p>

        </form>
    </div>

</body>

</html>
