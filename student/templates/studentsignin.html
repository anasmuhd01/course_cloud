<body class="bg-gray-900">


    <div class="container flex min-h-full flex-col items-center justify-center px-6 py-12 lg:px-8  ">

        <h2 class="text-5xl font-semibold tracking-tight text-white sm:text-7xl">Sign In</h2>
        {% if messages %}
        {% for msg in messages %}
        <span class="pt-4 font text-amber-500">{{msg}}</span>
        {% endfor %}
        {% endif %}
        <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">
            <form action="#" method="POST" class="space-y-6">
                {% csrf_token %}
                <div>
                    <label for="" class="block text-sm/6 font-medium text-gray-100">Username</label>
                    <div class="mt-2">
                        <input id="text" type="text" name="username"
                            class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-white outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6" />
                    </div>
                </div>

                <div>
                    <div class="flex items-center justify-between">
                        <label for="password" class="block text-sm/6 font-medium text-gray-100">Password</label>
                        <div class="text-sm">
                            <a href="#" class="font-semibold text-indigo-400 hover:text-indigo-300">Forgot password?</a>
                        </div>
                    </div>
                    <div class="mt-2">
                        <input id="password" type="password" name="password" required autocomplete="current-password"
                            class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-white outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6" />
                    </div>
                </div>


                <div class="flex justify-between">
                    <button type="submit" class="flex  justify-center rounded-md bg-indigo-500 px-3 py-1.5 text-sm/6 
                        font-semibold text-white hover:bg-indigo-400 focus-visible:outline-2 focus-visible:outline-offset-2 
                        focus-visible:outline-indigo-500">Signin</button>
                    <a href="{% url 'signup' %}" class="underline text-white">New Student ?</a>
                </div>

            </form>


        </div>
    </div>

        <button class="btn btn-primary"> submit</button>

</body>

</html>
